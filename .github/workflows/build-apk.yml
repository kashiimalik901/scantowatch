name: Build APK

# Builds the ARCore demo in the cloud so no local Android toolchain is needed.
# The APK is published to a rolling "build-latest" release, giving a stable
# direct-download URL that installs cleanly from a phone browser.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # AGP 8.x requires Java 17.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show toolchain
        run: flutter --version

      # The repo holds only our sources; the scaffold is generated here so we
      # never have to commit Gradle wrappers or platform boilerplate.
      - name: Create Flutter scaffold
        run: flutter create --org com.scantowatch --project-name scantowatch .

      - name: Install ARCore sources
        run: bash arcore_src/install.sh

      - name: Resolve dependencies
        run: flutter pub get

      # Fails on errors only, not lints. Catches Dart mistakes in ~20s instead of
      # waiting ~2min for Gradle to reach the kernel-snapshot step and fail there.
      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      # --split-per-abi produces one APK per CPU architecture instead of a "fat"
      # APK carrying all three. The fat APK bundles armeabi-v7a + arm64-v8a +
      # x86_64 copies of the Flutter engine AND the ARCore native libs, which is
      # where most of the size goes. Virtually every phone since ~2019 is arm64.
      - name: Build release APKs
        run: flutter build apk --release --split-per-abi

      # The Play Store wants an AAB and delivers only the slice each device
      # needs, so the user's actual download is smaller again.
      - name: Build app bundle
        run: flutter build appbundle --release

      - name: Collect outputs and report sizes
        run: |
          mkdir -p out
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk out/scantowatch-arm64.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk out/scantowatch-arm32.apk
          cp build/app/outputs/bundle/release/app-release.aab out/scantowatch.aab

          echo "### Build sizes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Output | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          for f in out/*; do
            echo "| $(basename $f) | $(du -h $f | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          done
          cat $GITHUB_STEP_SUMMARY
          ls -lh out/

      - uses: actions/upload-artifact@v4
        with:
          name: scantowatch-builds
          path: out/
          retention-days: 30

      # Direct download link for installing on the phone.
      - name: Publish rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-latest
          name: Latest build
          body: |
            Automatic build of the ScanToWatch ARCore demo.

            **Install `scantowatch-arm64.apk`** — this is the one you want for
            any phone from roughly 2019 onward. Use `scantowatch-arm32.apk` only
            if arm64 refuses to install on an older device.

            `scantowatch.aab` is for uploading to the Play Store, not for direct
            installation.

            Commit: ${{ github.sha }}
          files: |
            out/scantowatch-arm64.apk
            out/scantowatch-arm32.apk
            out/scantowatch.aab
          prerelease: true
