name: Build APK

# Builds the ARCore demo in the cloud so no local Android toolchain is needed.
# The APK is published to a rolling "build-latest" release, giving a stable
# direct-download URL that installs cleanly from a phone browser.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # AGP 8.x requires Java 17.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show toolchain
        run: flutter --version

      # The repo holds only our sources; the scaffold is generated here so we
      # never have to commit Gradle wrappers or platform boilerplate.
      - name: Create Flutter scaffold
        run: flutter create --org com.scantowatch --project-name scantowatch .

      - name: Install ARCore sources
        run: bash arcore_src/install.sh

      - name: Resolve dependencies
        run: flutter pub get

      - name: Analyze (non-blocking)
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mkdir -p out
          cp build/app/outputs/flutter-apk/app-release.apk out/scantowatch.apk
          ls -lh out/

      - uses: actions/upload-artifact@v4
        with:
          name: scantowatch-apk
          path: out/scantowatch.apk
          retention-days: 30

      # Direct download link for installing on the phone.
      - name: Publish rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-latest
          name: Latest build
          body: |
            Automatic build of the ScanToWatch ARCore demo.

            **Install:** download `scantowatch.apk` on an ARCore-capable Android
            phone and open it. You will need to allow installing from unknown
            sources.

            Commit: ${{ github.sha }}
          files: out/scantowatch.apk
          prerelease: true
